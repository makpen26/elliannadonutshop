[build]
  command = "npm run build"
  publish = "dist"

# Sveltia CMS admin SPA — serve index.html for all /admin/* paths
[[redirects]]
  from = "/admin"
  to = "/admin/"
  status = 301

[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200

# SPA fallback — all other routes serve index.html for client-side routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
